<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信服务商平台</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="page">
    <h1 class="brand">微信服务商平台</h1>
    <p class="lede">产品原型演示与方案文档入口。Demo 可点可玩；文档为只读阅读页，与正式交付口径一致。</p>

    <section class="section" aria-labelledby="sec-demo">
      <div class="section-label">
        <h2 id="sec-demo">Demo</h2>
        <span class="meta">2</span>
      </div>
      <div class="stack">
        <a class="card" href="dashboard.html">
          <span class="card-title">经营控制台综合看板</span>
          <span class="pill pill-demo">Demo</span>
          <span class="card-desc">总览页数据报表与交互原型，对照页面方案阅读。</span>
          <span class="card-arrow" aria-hidden="true">→</span>
        </a>
        <a class="card" href="audit.html">
          <span class="card-title">审核管理</span>
          <span class="pill pill-demo">Demo</span>
          <span class="card-desc">运营工作台审核专区交互原型。</span>
          <span class="card-arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </section>

    <section class="section" aria-labelledby="sec-docs">
      <div class="section-label">
        <h2 id="sec-docs">文档</h2>
        <span class="meta">按主题进库</span>
      </div>
      <div class="stack">
        <a class="card" href="docs/">
          <span class="card-title">文档库</span>
          <span class="pill pill-decision">4 篇</span>
          <span class="card-desc">产品方案与决策记录：总览页、代申诉、商家确认入口、第三方平台账号绑定。</span>
          <span class="card-arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </section>

    <p class="foot">GitHub Pages · service-provider-demos</p>
  </div>
</body>
</html>
